<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>ProLife Widget</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --primary-color: #383838;
    --accent-color: #6fc2ff;
    --header-bg: #ffde00;
    --success-color: #4ade80;
    --danger-color: #ff6b6b;
    --warning-color: #fbbf24;
    --bg-color: #fdfdfd;
    --card-bg: #ffffff;
    --text-main: #383838;
    --text-secondary: #666666;
    --border-color: #383838;
    --shadow: 4px 4px 0 0 #383838;
    --radius: 2px;
    --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
.dark-mode {
    --primary-color: #e0e0e0;
    --bg-color: #1e1e1e;
    --card-bg: #2d2d2d;
    --text-main: #e8e8e8;
    --text-secondary: #b0b0b0;
    --border-color: #4a4a4a;
    --shadow: 4px 4px 0 0 rgba(74,74,74,0.6);
    --header-bg: #3a3a3a;
    --accent-color: #7eb3ff;
    --success-color: #6dd89a;
    --danger-color: #ff8787;
    --warning-color: #ffc876;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
    height: 100%;
    background: transparent;
    font-family: var(--font-family);
    color: var(--text-main);
    overflow: hidden;
    user-select: none;
}
#widget-root {
    height: 100%;
    background: var(--bg-color);
    border: 2px solid var(--border-color);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: var(--shadow);
    position: relative;
}

/* Header */
#header {
    background: var(--header-bg);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--border-color);
    -webkit-app-region: drag;
    flex-shrink: 0;
}
#header .date {
    font-weight: 800;
    font-size: 14px;
    color: var(--primary-color);
}
#header .actions {
    display: flex;
    gap: 6px;
    -webkit-app-region: no-drag;
}
#header .actions button {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 14px;
    color: var(--primary-color);
    padding: 2px 5px;
    border-radius: var(--radius);
}
#header .actions button:hover {
    background: rgba(0,0,0,0.1);
}

/* Tabs */
#tabs {
    display: flex;
    border-bottom: 2px solid var(--border-color);
    flex-shrink: 0;
    background: var(--card-bg);
}
#tabs button {
    flex: 1;
    padding: 8px 0;
    border: none;
    background: transparent;
    font-family: var(--font-family);
    font-weight: 700;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.15s;
}
#tabs button.active {
    color: var(--accent-color);
    border-bottom-color: var(--accent-color);
}
#tabs button:hover:not(.active) {
    background: rgba(0,0,0,0.03);
}

/* Content */
#content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 10px;
}
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }
::-webkit-scrollbar-track { background: transparent; }
#content:not(:hover)::-webkit-scrollbar-thumb { background: transparent; }

/* Add task floating button */
.add-task-fab {
    position: absolute;
    bottom: 50px;
    right: 14px;
    width: 36px;
    height: 36px;
    background: var(--accent-color);
    border: 2px solid var(--border-color);
    border-radius: 50%;
    box-shadow: 2px 2px 0 0 var(--border-color);
    cursor: pointer;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 16px;
    transition: all 0.15s;
}
.add-task-fab:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 0 var(--border-color); }
.add-task-fab:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 0 var(--border-color); }

/* Add task popup */
.add-task-overlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.add-task-overlay.show { display: flex; }
.add-task-card {
    background: var(--card-bg);
    border: 2px solid var(--border-color);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    width: 100%;
    max-width: 340px;
}
.add-task-card h4 {
    font-size: 13px;
    font-weight: 800;
    margin-bottom: 12px;
    text-transform: uppercase;
}
.add-task-card input, .add-task-card select {
    width: 100%;
    padding: 8px 10px;
    border: 2px solid var(--border-color);
    border-radius: var(--radius);
    background: var(--bg-color);
    font-family: var(--font-family);
    font-size: 12px;
    color: var(--text-main);
    margin-bottom: 10px;
    box-sizing: border-box;
}
.add-task-card .btn-row {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
}
.add-task-card .btn-sm {
    padding: 6px 14px;
    border: 2px solid var(--border-color);
    border-radius: var(--radius);
    font-family: var(--font-family);
    font-weight: 700;
    font-size: 11px;
    cursor: pointer;
    background: var(--card-bg);
    color: var(--text-main);
    box-shadow: 2px 2px 0 0 var(--border-color);
}
.add-task-card .btn-sm:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 0 var(--border-color); }
.add-task-card .btn-sm.primary { background: var(--accent-color); color: white; }

/* Widget transparency transition */
#widget-root { transition: opacity 0.3s ease; }

/* Section panels */
.panel { display: none; }
.panel.active { display: block; }

/* Task item */
.task-item {
    background: var(--card-bg);
    border: 2px solid var(--border-color);
    border-radius: var(--radius);
    padding: 8px 10px;
    margin-bottom: 8px;
    box-shadow: 3px 3px 0 0 var(--border-color);
    display: flex;
    align-items: flex-start;
    gap: 8px;
    transition: all 0.15s;
    cursor: default;
}
.task-item:hover {
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 0 var(--border-color);
}
.task-item.done {
    opacity: 0.5;
}
.task-item.done .task-name {
    text-decoration: line-through;
}
.task-item.overdue {
    border-left: 4px solid var(--danger-color);
}
.task-check {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border-color);
    border-radius: var(--radius);
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    background: var(--card-bg);
}
.task-check:hover { border-color: var(--accent-color); }
.task-check.checked {
    background: var(--accent-color);
    border-color: var(--accent-color);
}
.task-check.checked::after {
    content: '\f00c';
    font-family: 'Font Awesome 6 Free';
    font-weight: 900;
    font-size: 10px;
    color: white;
}
.task-info { flex: 1; min-width: 0; }
.task-name {
    font-weight: 600;
    font-size: 13px;
    line-height: 1.3;
    word-break: break-word;
}
.task-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 3px;
    font-size: 11px;
    color: var(--text-secondary);
    flex-wrap: wrap;
}
.task-meta .priority-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
}
.task-meta .group-tag {
    background: var(--accent-color);
    color: white;
    padding: 1px 6px;
    border-radius: var(--radius);
    font-size: 10px;
    font-weight: 600;
}
.task-meta .ddl {
    font-weight: 600;
}
.task-meta .ddl.overdue {
    color: var(--danger-color);
}

/* Project card */
.project-card {
    background: var(--card-bg);
    border: 2px solid var(--border-color);
    border-radius: var(--radius);
    padding: 10px 12px;
    margin-bottom: 8px;
    box-shadow: 3px 3px 0 0 var(--border-color);
    cursor: pointer;
    transition: all 0.15s;
}
.project-card:hover {
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 0 var(--border-color);
}
.project-card .expand-icon {
    font-size: 10px;
    transition: transform 0.2s;
    margin-left: 6px;
}
.project-card.expanded .expand-icon {
    transform: rotate(90deg);
}
.project-name {
    font-weight: 700;
    font-size: 13px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.project-name .status {
    font-size: 10px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: var(--radius);
    border: 1px solid var(--border-color);
}
.progress-bar {
    height: 8px;
    background: var(--bg-color);
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 4px;
}
.progress-fill {
    height: 100%;
    background: var(--accent-color);
    transition: width 0.3s;
}
.project-meta {
    font-size: 11px;
    color: var(--text-secondary);
    display: flex;
    justify-content: space-between;
}
.project-tasks {
    display: none;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--border-color);
}
.project-card.expanded .project-tasks {
    display: block;
}
.project-tasks .task-item {
    box-shadow: none;
    border-width: 1px;
    padding: 6px 8px;
    margin-bottom: 4px;
}
.project-tasks .task-item:last-child {
    margin-bottom: 0;
}

/* Daily plan item */
.plan-item {
    background: var(--card-bg);
    border: 2px solid var(--border-color);
    border-radius: var(--radius);
    padding: 8px 10px;
    margin-bottom: 8px;
    box-shadow: 3px 3px 0 0 var(--border-color);
    display: flex;
    align-items: center;
    gap: 8px;
}
.plan-item.done { opacity: 0.5; }
.plan-item.done .plan-text { text-decoration: line-through; }
.plan-time {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent-color);
    white-space: nowrap;
    margin-left: auto;
}
.plan-text {
    font-size: 13px;
    font-weight: 600;
    flex: 1;
    word-break: break-word;
}

/* Empty state */
.empty {
    text-align: center;
    padding: 30px 10px;
    color: var(--text-secondary);
    font-size: 13px;
}
.empty i { font-size: 28px; margin-bottom: 8px; display: block; opacity: 0.4; }

/* Footer */
#footer {
    border-top: 2px solid var(--border-color);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card-bg);
    flex-shrink: 0;
}
#footer .sync-status {
    font-size: 11px;
    color: var(--text-secondary);
}
#footer .open-btn {
    background: var(--accent-color);
    color: white;
    border: 2px solid var(--border-color);
    padding: 4px 12px;
    font-family: var(--font-family);
    font-weight: 700;
    font-size: 11px;
    border-radius: var(--radius);
    cursor: pointer;
    box-shadow: 2px 2px 0 0 var(--border-color);
}
#footer .open-btn:hover {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 0 var(--border-color);
}
#footer .open-btn:active {
    transform: translate(1px, 1px);
    box-shadow: 1px 1px 0 0 var(--border-color);
}

/* Loading */
.loading {
    text-align: center;
    padding: 40px;
    color: var(--text-secondary);
}
.loading i { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Count badge */
.count-badge {
    background: var(--danger-color);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 0 5px;
    border-radius: 10px;
    margin-left: 4px;
}

/* Subtasks in widget */
.task-subtasks {
    margin-top: 4px;
    padding-left: 2px;
}
.task-subtasks .subtask-row {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-secondary);
    padding: 1px 0;
}
.task-subtasks .subtask-row.st-done .st-text {
    text-decoration: line-through;
    opacity: 0.5;
}
.task-subtasks .st-check {
    width: 12px;
    height: 12px;
    border: 1.5px solid var(--border-color);
    border-radius: 2px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--card-bg);
}
.task-subtasks .st-check.checked {
    background: var(--accent-color);
    border-color: var(--accent-color);
}
.task-subtasks .st-check.checked::after {
    content: '\f00c';
    font-family: 'Font Awesome 6 Free';
    font-weight: 900;
    font-size: 7px;
    color: white;
}
.task-meta .priority-tag {
    font-size: 10px;
    font-weight: 700;
    padding: 0 5px;
    border-radius: var(--radius);
    border: 1px solid;
}
.task-meta .priority-tag.high {
    color: var(--danger-color);
    border-color: var(--danger-color);
}
.task-meta .priority-tag.medium {
    color: var(--warning-color);
    border-color: var(--warning-color);
}
.task-meta .priority-tag.low {
    color: var(--success-color);
    border-color: var(--success-color);
}
.subtask-summary {
    font-size: 10px;
    color: var(--text-secondary);
    margin-top: 3px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
}
.subtask-summary:hover {
    color: var(--accent-color);
}
.subtask-summary .st-bar {
    height: 4px;
    flex: 1;
    max-width: 60px;
    background: var(--bg-color);
    border-radius: 2px;
    overflow: hidden;
    border: 1px solid var(--border-color);
}
.subtask-summary .st-bar-fill {
    height: 100%;
    background: var(--accent-color);
    transition: width 0.3s;
}

/* Overdue collapsible section */
.overdue-section {
    margin-top: 10px;
    border: 2px solid var(--border-color);
    border-radius: var(--radius);
    box-shadow: 3px 3px 0 0 var(--border-color);
    overflow: hidden;
}
.overdue-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    background: var(--card-bg);
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    color: var(--danger-color);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
}
.overdue-header:hover {
    background: rgba(255,107,107,0.05);
}
.overdue-section.expanded .overdue-header {
    border-bottom-color: var(--border-color);
}
.overdue-header .overdue-icon {
    font-size: 10px;
    transition: transform 0.2s;
}
.overdue-section.expanded .overdue-header .overdue-icon {
    transform: rotate(90deg);
}
.overdue-body {
    display: none;
    padding: 8px;
}
.overdue-section.expanded .overdue-body {
    display: block;
}
.overdue-body .task-item {
    box-shadow: none;
    border-width: 1px;
}
</style>
</head>
<body>
<div id="widget-root">
    <div id="header">
        <span class="date" id="headerDate"></span>
        <div class="actions">
            <button onclick="refreshData()" title="刷新"><i class="fas fa-sync-alt"></i></button>
            <button onclick="toggleDark()" title="主题"><i class="fas fa-moon" id="themeIcon"></i></button>
            <button onclick="togglePin()" title="置顶"><i class="fas fa-thumbtack" id="pinIcon"></i></button>
            <button onclick="closeWidget()" title="关闭" style="color:var(--danger-color);"><i class="fas fa-times"></i></button>
        </div>
    </div>
    <div id="tabs">
        <button class="active" onclick="switchTab('tasks', this)"><i class="fas fa-tasks"></i> 任务 <span id="taskCount" class="count-badge" style="display:none"></span></button>
        <button onclick="switchTab('projects', this)"><i class="fas fa-project-diagram"></i> 项目</button>
        <button onclick="switchTab('plans', this)"><i class="fas fa-calendar-day"></i> 今日</button>
    </div>
    <div id="content">
        <div id="panel-tasks" class="panel active">
            <div class="loading"><i class="fas fa-spinner"></i> 加载中...</div>
        </div>
        <div id="panel-projects" class="panel">
            <div class="loading"><i class="fas fa-spinner"></i> 加载中...</div>
        </div>
        <div id="panel-plans" class="panel">
            <div class="loading"><i class="fas fa-spinner"></i> 加载中...</div>
        </div>
    </div>
    <!-- 添加任务浮动按钮 -->
    <button class="add-task-fab" onclick="showAddTaskCard()" title="快速添加任务"><i class="fas fa-plus"></i></button>

    <!-- 添加任务弹出卡片 -->
    <div class="add-task-overlay" id="addTaskOverlay" onclick="if(event.target===this)hideAddTaskCard()">
        <div class="add-task-card">
            <h4><i class="fas fa-plus-circle" style="margin-right:6px;color:var(--accent-color);"></i>添加任务</h4>
            <input type="text" id="widgetTaskName" placeholder="添加一个新的任务..." autocomplete="off">
            <!-- 日期 + 优先级 -->
            <div style="display:flex;gap:8px;">
                <input type="date" id="widgetTaskDate" style="flex:1;">
                <select id="widgetTaskPriority" style="flex:0 0 80px;">
                    <option value="low">低优先级</option>
                    <option value="medium" selected>中优先级</option>
                    <option value="high">高优先级</option>
                </select>
            </div>
            <!-- 时间段 -->
            <div style="display:flex;gap:8px;align-items:center;">
                <span style="font-weight:700;font-size:10px;white-space:nowrap;color:var(--text-secondary);">时间段</span>
                <input type="time" id="widgetTaskStartTime" style="flex:1;">
                <span style="font-weight:700;font-size:10px;color:var(--text-secondary);">至</span>
                <input type="time" id="widgetTaskEndTime" style="flex:1;">
            </div>
            <!-- 归属 -->
            <select id="widgetTaskGroup">
                <option value="">选择分组或项目</option>
            </select>
            <!-- 备注 -->
            <textarea id="widgetTaskNotes" placeholder="备注（可选）" style="width:100%;padding:8px 10px;border:2px solid var(--border-color);border-radius:var(--radius);background:var(--bg-color);font-family:var(--font-family);font-size:12px;color:var(--text-main);margin-bottom:10px;box-sizing:border-box;min-height:50px;resize:vertical;"></textarea>
            <div class="btn-row">
                <button class="btn-sm" onclick="hideAddTaskCard()">取消</button>
                <button class="btn-sm primary" onclick="submitWidgetTask()"><i class="fas fa-plus" style="margin-right:4px;"></i>添加</button>
            </div>
        </div>
    </div>

    <div id="footer">
        <span class="sync-status" id="syncStatus">就绪</span>
        <button class="open-btn" onclick="openProLife()"><i class="fas fa-external-link-alt"></i> 打开 ProLife</button>
    </div>
</div>

<script>
const fs = require('fs');
const path = require('path');
const { ipcRenderer } = require('electron');

const SUPABASE_URL = 'https://gcrdheovyzjywwyijjli.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjcmRoZW92eXpqeXd3eWlqamxpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1NzQxMDIsImV4cCI6MjA4MjE1MDEwMn0.7bhn24n_-HMPbN_IeTb6cZNrzH3-GFkKtxv0imkOSBM';

const DATA_DIR = path.join(process.env.APPDATA || '', 'ProLife');
const DATA_FILE = path.join(DATA_DIR, 'widget-data.json');

let data = { todos: [], projects: [], dailyPlans: [], groups: [], auth: {} };
let pinned = true;

// --- 初始化 ---
document.addEventListener('DOMContentLoaded', () => {
    initTheme();
    updateDate();
    refreshData();
    // 每60秒自动刷新
    setInterval(refreshData, 60000);
    // 监听主应用数据变更通知
    ipcRenderer.on('refresh-widget-data', () => {
        refreshData();
    });
});

function updateDate() {
    const now = new Date();
    const days = ['日','一','二','三','四','五','六'];
    document.getElementById('headerDate').textContent =
        `${now.getMonth()+1}月${now.getDate()}日 周${days[now.getDay()]}`;
}

// --- 主题 ---
function initTheme() {
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.body.classList.add('dark-mode');
        document.getElementById('themeIcon').className = 'fas fa-sun';
    }
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        document.body.classList.toggle('dark-mode', e.matches);
        document.getElementById('themeIcon').className = e.matches ? 'fas fa-sun' : 'fas fa-moon';
    });
}

function toggleDark() {
    document.body.classList.toggle('dark-mode');
    const isDark = document.body.classList.contains('dark-mode');
    document.getElementById('themeIcon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
}

function togglePin() {
    pinned = !pinned;
    ipcRenderer.send('widget-toggle-top', pinned);
    document.getElementById('pinIcon').style.opacity = pinned ? '1' : '0.4';
}

// --- Tab 切换 ---
function switchTab(tab, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    btn.classList.add('active');
}

// --- 数据加载 ---
function refreshData() {
    document.getElementById('syncStatus').textContent = '刷新中...';
    // 优先读本地文件
    let loaded = loadLocalData();
    if (loaded) {
        renderAll();
        document.getElementById('syncStatus').textContent = '本地数据 ' + formatTime(data.updatedAt);
    }
    // 尝试从云端刷新
    loadCloudData().then(ok => {
        if (ok) {
            renderAll();
            document.getElementById('syncStatus').textContent = '已同步 ' + formatTime(new Date().toISOString());
        } else if (!loaded) {
            document.getElementById('syncStatus').textContent = '无数据';
            renderAll();
        }
    });
}

function loadLocalData() {
    try {
        if (fs.existsSync(DATA_FILE)) {
            const raw = fs.readFileSync(DATA_FILE, 'utf-8');
            const parsed = JSON.parse(raw);
            data = { ...data, ...parsed };
            return true;
        }
    } catch(e) { console.warn('[Local]', e); }
    return false;
}

async function loadCloudData() {
    if (!data.auth || !data.auth.access_token || !data.auth.user_id) return false;
    try {
        // 先尝试刷新 token
        let token = data.auth.access_token;
        if (data.auth.refresh_token) {
            try {
                const refreshRes = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
                    body: JSON.stringify({ refresh_token: data.auth.refresh_token })
                });
                if (refreshRes.ok) {
                    const refreshData = await refreshRes.json();
                    token = refreshData.access_token;
                    data.auth.access_token = token;
                    data.auth.refresh_token = refreshData.refresh_token || data.auth.refresh_token;
                }
            } catch(e) {}
        }

        const res = await fetch(`${SUPABASE_URL}/rest/v1/user_data?id=eq.${data.auth.user_id}`, {
            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
            const arr = await res.json();
            if (arr && arr[0]) {
                data.todos = arr[0].todos || [];
                data.projects = arr[0].projects || [];
                data.dailyPlans = arr[0].dailyPlans || [];
                data.groups = arr[0].groups || [];
                // 写回本地
                saveLocalData();
                return true;
            }
        }
    } catch(e) { console.warn('[Cloud]', e); }
    return false;
}

function saveLocalData() {
    try {
        if (!fs.existsSync(DATA_DIR)) fs.mkdirSync(DATA_DIR, { recursive: true });
        fs.writeFileSync(DATA_FILE, JSON.stringify({
            ...data,
            updatedAt: new Date().toISOString()
        }));
    } catch(e) { console.warn('[Save]', e); }
}

async function syncToggleToCloud(todoId, done) {
    if (!data.auth || !data.auth.access_token || !data.auth.user_id) return;
    try {
        const payload = {
            id: data.auth.user_id,
            todos: data.todos,
            projects: data.projects,
            dailyPlans: data.dailyPlans,
            groups: data.groups,
            updated_at: new Date().toISOString()
        };
        await fetch(`${SUPABASE_URL}/rest/v1/user_data?id=eq.${data.auth.user_id}`, {
            method: 'PATCH',
            headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${data.auth.access_token}`,
                'Prefer': 'return=representation'
            },
            body: JSON.stringify(payload)
        });
    } catch(e) { console.warn('[Sync]', e); }
}

// --- 渲染 ---
function renderAll() {
    renderTasks();
    renderProjects();
    renderPlans();
}

function renderTasks() {
    const panel = document.getElementById('panel-tasks');
    const today = new Date().toISOString().slice(0, 10);
    const now = new Date();
    now.setHours(0,0,0,0);

    // 今日任务：今天到期的未完成 + 无日期的未完成 + 今天完成的（仅今日到期或无日期的）
    const todayTasks = (data.todos || []).filter(t => {
        if (t.projectId) return false;
        if (!t.completed && (!t.date || t.date === today)) return true;
        if (t.completed && (!t.date || t.date === today) && t.updatedAt && t.updatedAt.slice(0, 10) === today) return true;
        return false;
    });

    // 超时任务：往日到期且未完成的（date < today）
    const overdueTasks = (data.todos || []).filter(t => {
        if (t.projectId) return false;
        if (t.completed) return false;
        if (t.date && t.date < today) return true;
        return false;
    });

    const countEl = document.getElementById('taskCount');
    const pendingCount = todayTasks.filter(t => !t.completed).length + overdueTasks.length;

    if (todayTasks.length === 0 && overdueTasks.length === 0) {
        panel.innerHTML = '<div class="empty"><i class="fas fa-check-circle"></i>没有待办任务</div>';
        countEl.style.display = 'none';
        return;
    }

    countEl.textContent = pendingCount;
    countEl.style.display = pendingCount > 0 ? 'inline' : 'none';

    const priOrder = { high: 0, medium: 1, low: 2 };

    // 排序今日任务
    const sortedToday = [...todayTasks].sort((a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
        const pa = priOrder[a.priority] ?? 1;
        const pb = priOrder[b.priority] ?? 1;
        if (pa !== pb) return pa - pb;
        const da = a.date ? new Date(a.date).getTime() : Infinity;
        const db = b.date ? new Date(b.date).getTime() : Infinity;
        return da - db;
    });

    let html = '';
    sortedToday.forEach(t => { html += buildTaskItemHtml(t, now); });

    // 超时任务折叠区
    if (overdueTasks.length > 0) {
        const sortedOverdue = [...overdueTasks].sort((a, b) => {
            const pa = priOrder[a.priority] ?? 1;
            const pb = priOrder[b.priority] ?? 1;
            if (pa !== pb) return pa - pb;
            const da = a.date ? new Date(a.date).getTime() : Infinity;
            const db = b.date ? new Date(b.date).getTime() : Infinity;
            return da - db;
        });
        let overdueHtml = '';
        sortedOverdue.forEach(t => { overdueHtml += buildTaskItemHtml(t, now); });
        html += `<div class="overdue-section" onclick="this.classList.toggle('expanded')">
            <div class="overdue-header">
                <i class="fas fa-chevron-right overdue-icon"></i>
                <i class="fas fa-exclamation-circle"></i> 已超时
                <span class="count-badge" style="background:var(--danger-color)">${overdueTasks.length}</span>
            </div>
            <div class="overdue-body" onclick="event.stopPropagation()">${overdueHtml}</div>
        </div>`;
    }

    panel.innerHTML = html;
}

function buildTaskItemHtml(t, now) {
    const isOverdue = t.date && new Date(t.date) < now;
    const group = (data.groups || []).find(g => g.id === t.groupId);
    const groupName = group ? group.name : '';
    const groupColor = group ? group.color : 'var(--accent-color)';

    let ddlText = '';
    if (t.date) {
        const d = new Date(t.date);
        ddlText = `${d.getMonth()+1}/${d.getDate()}`;
        if (t.time) ddlText += ' ' + t.time;
    }

    const priLabels = { high: '高', medium: '中', low: '低' };
    const priLabel = priLabels[t.priority] || '中';
    const priClass = t.priority || 'medium';

    let subtasksHtml = '';
    if (t.subtasks && t.subtasks.length > 0) {
        const stDone = t.subtasks.filter(st => st.completed).length;
        const stTotal = t.subtasks.length;
        const stPct = Math.round(stDone / stTotal * 100);
        const hasIncomplete = stDone < stTotal;
        subtasksHtml = `
            <div class="subtask-summary" onclick="event.stopPropagation();toggleTaskSubtasks(this)">
                <i class="fas fa-chevron-right" style="font-size:8px;transition:transform 0.2s;${hasIncomplete ? 'transform:rotate(90deg);' : ''}"></i>
                <i class="fas fa-tasks" style="font-size:9px;"></i> ${stDone}/${stTotal}
                <div class="st-bar"><div class="st-bar-fill" style="width:${stPct}%"></div></div>
            </div>
            <div class="task-subtasks" style="display:${hasIncomplete ? 'block' : 'none'};">
                ${t.subtasks.map(st => `
                    <div class="subtask-row ${st.completed ? 'st-done' : ''}">
                        <div class="st-check ${st.completed ? 'checked' : ''}" onclick="event.stopPropagation();toggleSubtask('${t.id}','${st.id}')"></div>
                        <span class="st-text">${escHtml(st.text)}</span>
                    </div>
                `).join('')}
            </div>`;
    }

    return `<div class="task-item ${t.completed ? 'done' : ''} ${isOverdue ? 'overdue' : ''}">
        <div class="task-check ${t.completed ? 'checked' : ''}" onclick="toggleTodo('${t.id}')"></div>
        <div class="task-info">
            <div class="task-name">${escHtml(t.text)}</div>
            <div class="task-meta">
                <span class="priority-tag ${priClass}">${priLabel}</span>
                ${ddlText ? `<span class="ddl ${isOverdue ? 'overdue' : ''}">${ddlText}</span>` : ''}
                ${groupName ? `<span class="group-tag" style="background:${groupColor}">${escHtml(groupName)}</span>` : ''}
            </div>
            ${subtasksHtml}
        </div>
    </div>`;
}

function renderProjects() {
    const panel = document.getElementById('panel-projects');
    const projects = data.projects || [];

    if (projects.length === 0) {
        panel.innerHTML = '<div class="empty"><i class="fas fa-folder-open"></i>没有项目</div>';
        return;
    }

    let html = '';
    projects.forEach(p => {
        // 从 todos 中查找属于该项目的任务
        const tasks = (data.todos || []).filter(t => String(t.projectId) == String(p.id));
        const done = tasks.filter(t => t.completed).length;
        const total = tasks.length;
        const pct = total > 0 ? Math.round(done / total * 100) : 0;

        let statusText = '进行中';
        let statusColor = 'var(--accent-color)';
        if (pct === 100 && total > 0) { statusText = '已完成'; statusColor = 'var(--success-color)'; }
        else if (p.status === 'completed') { statusText = '已完成'; statusColor = 'var(--success-color)'; }
        else if (p.status === 'paused') { statusText = '暂停'; statusColor = 'var(--warning-color)'; }

        let ddlText = '';
        if (p.deadline) {
            const d = new Date(p.deadline);
            ddlText = `${d.getMonth()+1}/${d.getDate()}`;
            if (new Date(p.deadline) < new Date()) ddlText = `<span style="color:var(--danger-color)">${ddlText} 逾期</span>`;
        }

        // 渲染项目下的任务列表
        let tasksHtml = '';
        if (tasks.length > 0) {
            const pending = tasks.filter(t => !t.completed);
            const completed = tasks.filter(t => t.completed);
            const sortedTasks = [...pending, ...completed];
            sortedTasks.forEach(t => {
                const priLabels = { high: '高', medium: '中', low: '低' };
                const priLabel = priLabels[t.priority] || '中';
                const priClass = t.priority || 'medium';

                // 子任务
                let stHtml = '';
                if (t.subtasks && t.subtasks.length > 0) {
                    const stDone = t.subtasks.filter(st => st.completed).length;
                    const stTotal = t.subtasks.length;
                    const stPct = Math.round(stDone / stTotal * 100);
                    const hasIncomplete = stDone < stTotal;
                    stHtml = `
                        <div class="subtask-summary" onclick="event.stopPropagation();toggleTaskSubtasks(this)">
                            <i class="fas fa-chevron-right" style="font-size:8px;transition:transform 0.2s;${hasIncomplete ? 'transform:rotate(90deg);' : ''}" data-expanded="${hasIncomplete}"></i>
                            <i class="fas fa-tasks" style="font-size:9px;"></i> ${stDone}/${stTotal}
                            <div class="st-bar"><div class="st-bar-fill" style="width:${stPct}%"></div></div>
                        </div>
                        <div class="task-subtasks" style="display:${hasIncomplete ? 'block' : 'none'};">
                            ${t.subtasks.map(st => `
                                <div class="subtask-row ${st.completed ? 'st-done' : ''}">
                                    <div class="st-check ${st.completed ? 'checked' : ''}" onclick="event.stopPropagation();toggleSubtask('${t.id}','${st.id}')"></div>
                                    <span class="st-text">${escHtml(st.text)}</span>
                                </div>
                            `).join('')}
                        </div>`;
                }

                tasksHtml += `<div class="task-item ${t.completed ? 'done' : ''}" onclick="event.stopPropagation();openTaskInMain('${t.id}','${p.id}')" style="cursor:pointer;" title="点击查看详情">
                    <div class="task-check ${t.completed ? 'checked' : ''}" onclick="event.stopPropagation();toggleTodo('${t.id}')"></div>
                    <div class="task-info">
                        <div class="task-name">${escHtml(t.text)}</div>
                        <div class="task-meta">
                            <span class="priority-tag ${priClass}">${priLabel}</span>
                            ${t.date ? `<span class="ddl">${new Date(t.date).getMonth()+1}/${new Date(t.date).getDate()}</span>` : ''}
                        </div>
                        ${stHtml}
                    </div>
                    <i class="fas fa-external-link-alt" style="font-size:9px;color:var(--text-secondary);margin-left:4px;flex-shrink:0;"></i>
                </div>`;
            });
        } else {
            tasksHtml = '<div style="text-align:center;color:var(--text-secondary);font-size:11px;padding:6px 0;">暂无任务</div>';
        }

        // 项目默认折叠
        html += `<div class="project-card" onclick="toggleProjectExpand(this)">
            <div class="project-name">
                <span><i class="fas fa-chevron-right expand-icon"></i> ${escHtml(p.name)}</span>
                <span class="status" style="color:${statusColor};border-color:${statusColor}">${statusText}</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${statusColor}"></div></div>
            <div class="project-meta">
                <span>${done}/${total} 任务 (${pct}%)</span>
                ${ddlText ? `<span>${ddlText}</span>` : ''}
            </div>
            <div class="project-tasks">${tasksHtml}</div>
        </div>`;
    });
    panel.innerHTML = html;
}

function toggleProjectExpand(el) {
    el.classList.toggle('expanded');
}

function renderPlans() {
    const panel = document.getElementById('panel-plans');
    const today = new Date().toISOString().slice(0, 10);
    const plans = (data.dailyPlans || []).filter(p => p.date === today);

    if (plans.length === 0) {
        panel.innerHTML = '<div class="empty"><i class="fas fa-calendar-check"></i>今天没有计划</div>';
        return;
    }

    // 按开始时间排序
    const sorted = [...plans].sort((a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
        const ta = a.startTime || a.time || '';
        const tb = b.startTime || b.time || '';
        return ta.localeCompare(tb);
    });

    let html = '';
    sorted.forEach(p => {
        const isDone = p.completed || p.done;
        // 构建时间显示
        let timeLabel = '';
        if (p.startTime) {
            timeLabel = p.startTime;
            if (p.endTime) timeLabel += ' - ' + p.endTime;
        } else if (p.time) {
            timeLabel = p.time;
        }

        html += `<div class="plan-item ${isDone ? 'done' : ''}">
            <div class="task-check ${isDone ? 'checked' : ''}" onclick="togglePlan('${p.id}')"></div>
            <span class="plan-text">${escHtml(p.text || p.content || '')}</span>
            ${timeLabel ? `<span class="plan-time"><i class="far fa-clock" style="font-size:10px;margin-right:3px;"></i>${timeLabel}</span>` : ''}
        </div>`;
    });
    panel.innerHTML = html;
}

// --- 交互 ---
function toggleTodo(id) {
    const todo = data.todos.find(t => String(t.id) === String(id));
    if (!todo) return;
    todo.completed = !todo.completed;
    todo.updatedAt = new Date().toISOString();
    saveLocalData();
    renderAll();
    syncToggleToCloud();
    // 通知主应用刷新
    ipcRenderer.send('widget-data-changed');
}

function togglePlan(id) {
    const plan = data.dailyPlans.find(p => String(p.id) === String(id));
    if (!plan) return;
    plan.completed = !plan.completed;
    saveLocalData();
    renderPlans();
    syncToggleToCloud();
    // 通知主应用刷新
    ipcRenderer.send('widget-data-changed');
}

function toggleTaskSubtasks(el) {
    const subtasksDiv = el.nextElementSibling;
    const icon = el.querySelector('.fa-chevron-right');
    if (subtasksDiv.style.display === 'none') {
        subtasksDiv.style.display = 'block';
        if (icon) icon.style.transform = 'rotate(90deg)';
    } else {
        subtasksDiv.style.display = 'none';
        if (icon) icon.style.transform = '';
    }
}

function toggleSubtask(todoId, subtaskId) {
    const todo = data.todos.find(t => String(t.id) === String(todoId));
    if (!todo || !todo.subtasks) return;
    const st = todo.subtasks.find(s => String(s.id) === String(subtaskId));
    if (!st) return;
    st.completed = !st.completed;
    saveLocalData();
    renderTasks();
    syncToggleToCloud();
    // 通知主应用刷新
    ipcRenderer.send('widget-data-changed');
}

function openProLife() {
    ipcRenderer.send('widget-open-main');
}

function closeWidget() {
    window.close();
}

// --- 打开主应用任务详情 ---
function openTaskInMain(taskId, projectId) {
    if (projectId) {
        ipcRenderer.send('widget-open-project-task-detail', {
            projectId: parseInt(projectId) || projectId,
            taskId: parseInt(taskId) || taskId

// --- 添加任务 ---
function showAddTaskCard() {
    const overlay = document.getElementById('addTaskOverlay');
    overlay.classList.add('show');
    document.getElementById('widgetTaskName').value = '';
    document.getElementById('widgetTaskDate').value = new Date().toISOString().slice(0,10);
    document.getElementById('widgetTaskPriority').value = 'medium';
    document.getElementById('widgetTaskStartTime').value = '';
    document.getElementById('widgetTaskEndTime').value = '';
    document.getElementById('widgetTaskNotes').value = '';
    // 填充分组和项目
    const groupSel = document.getElementById('widgetTaskGroup');
    groupSel.innerHTML = '<option value="">选择分组或项目</option>';
    groupSel.innerHTML += '<optgroup label="分组">';
    (data.groups || []).forEach(g => {
        groupSel.innerHTML += `<option value="g_${g.id}">${escHtml(g.name)}</option>`;
    });
    groupSel.innerHTML += '</optgroup>';
    if (data.projects && data.projects.length > 0) {
        groupSel.innerHTML += '<optgroup label="项目">';
        data.projects.forEach(p => {
            groupSel.innerHTML += `<option value="p_${p.id}">${escHtml(p.name)}</option>`;
        });
        groupSel.innerHTML += '</optgroup>';
    }
    setTimeout(() => document.getElementById('widgetTaskName').focus(), 100);
}

function hideAddTaskCard() {
    document.getElementById('addTaskOverlay').classList.remove('show');
}

function submitWidgetTask() {
    const name = document.getElementById('widgetTaskName').value.trim();
    if (!name) return;
    const date = document.getElementById('widgetTaskDate').value;
    const priority = document.getElementById('widgetTaskPriority').value;
    const catValue = document.getElementById('widgetTaskGroup').value;
    const startTime = document.getElementById('widgetTaskStartTime').value;
    const endTime = document.getElementById('widgetTaskEndTime').value;
    const notes = document.getElementById('widgetTaskNotes').value.trim();

    let groupId = null;
    let projectId = null;
    if (catValue.startsWith('g_')) {
        groupId = parseInt(catValue.substring(2));
    } else if (catValue.startsWith('p_')) {
        projectId = parseInt(catValue.substring(2));
    }

    const newTodo = {
        id: Date.now(),
        text: name,
        completed: false,
        date: date || null,
        priority: priority,
        groupId: groupId,
        projectId: projectId,
        startTime: startTime || null,
        endTime: endTime || null,
        notes: notes || '',
        subtasks: [],
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
    };

    data.todos.push(newTodo);
    saveLocalData();
    renderAll();
    syncToggleToCloud();
    ipcRenderer.send('widget-data-changed');
    hideAddTaskCard();
}

// --- 失焦透明 ---
ipcRenderer.on('widget-blur', () => {
    document.getElementById('widget-root').style.opacity = '0.6';
});
ipcRenderer.on('widget-focus', () => {
    document.getElementById('widget-root').style.opacity = '1';
});

// --- 工具 ---
function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}
